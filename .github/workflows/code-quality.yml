name: CodeQuality
on:
  workflow_call:
    secrets:
      SENTRY_AUTH_TOKEN:
        required: false
      GERICHTSFINDER_ENCRYPTION_KEY:
        required: false

jobs:
  code-quality:
    strategy:
      matrix:
        cmd: ["format", "lint", "typecheck", "test:coverage"]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    name: pnpm run ${{ matrix.cmd }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/cached-checkout-install
      - run: pnpm run ${{ matrix.cmd }}
        env:
          SENTRY_AUTH_TOKEN: "${{ secrets.SENTRY_AUTH_TOKEN }}"
          GERICHTSFINDER_ENCRYPTION_KEY: "${{ secrets.GERICHTSFINDER_ENCRYPTION_KEY }}"
      - name: Upload coverage
        if: ${{ matrix.cmd == 'test:coverage' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage/
          retention-days: 1
