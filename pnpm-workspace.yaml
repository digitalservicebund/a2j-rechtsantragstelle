allowBuilds:
  # https://pnpm.io/settings#allowbuilds
  esbuild: true
  lefthook: true
  unrs-resolver: true
  "@sentry/cli": false
  core-js: false
  core-js-pure: false
  "@node-saml/node-saml": true
  xml-crypto: true
  protobufjs: false
  "@node-saml/node-saml@https://codeload.github.com/digitalservicebund/node-saml/tar.gz/850e8e8d5e7f8c037f20e2d808bde05949b21916": true
  xml-crypto@https://codeload.github.com/digitalservicebund/xml-crypto/tar.gz/1d02080b4f4b37bf72923c8ca38ab828039f9101: true

overrides:
  qs@<6.14.1: ">=6.14.1"

dedupePeers: true
preferFrozenLockfile: true
blockExoticSubdeps: false # enable once don't use modified node-saml/xml-crypto dependencies anymore, see https://pnpm.io/settings#blockexoticsubdeps

trustPolicy: no-downgrade # https://pnpm.io/settings#trustpolicy

trustPolicyExclude:
  - chokidar@4.0.3 # solved by upgrading to 5.0.0, see https://github.com/paulmillr/chokidar/issues/1440
  - semver@6.3.1 # solved by upgrading to 7.x
  - hosted-git-info@6.1.3 # solved by upgrading to 6.1.4
